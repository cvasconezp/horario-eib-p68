// ── Utilidades ──

function getZona(centro) {
  return DATA.zonas[centro] || "OC";
}

function getMateriasBimestre(nivel, centro, bim) {
  const zona = getZona(centro);
  const materias = DATA.niveles[nivel]?.materias || [];
  return materias.filter(m => {
    const b = m.bimestre[zona];
    if (bim === 0) return b === 0; // semestral
    if (bim === 1) return b === 1;
    if (bim === 2) return b === 2;
    return false;
  });
}

function getDocente(materia, centro) {
  return materia.docentes[centro] || materia.docentes["Todos los centros"] || "Por confirmar";
}

function formatFecha(str) {
  const d = new Date(str + "T12:00:00");
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
}

function formatFechaCorta(str) {
  const d = new Date(str + "T12:00:00");
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${d.getDate()} ${meses[d.getMonth()]}`;
}

function getDayClass(dia, tipo) {
  if (tipo === "por-confirmar") return "day-por-confirmar";
  if (!dia) return "day-semestral";
  const d = dia.toLowerCase();
  if (d.includes("lunes")) return "day-lunes";
  if (d.includes("martes")) return "day-martes";
  if (d.includes("miércoles") || d.includes("viernes")) return "day-miercoles";
  if (d.includes("jueves")) return "day-jueves";
  return "day-semestral";
}

// ── Generador ICS ──

function generarFechasClases(materia, bimNum) {
  const bimData = bimNum === 1 ? DATA.calendario.bim1 : DATA.calendario.bim2;
  const inicio = new Date(bimData.inicio + "T12:00:00");
  const fechas = [];

  if (!materia.dia || !materia.hora) return fechas;

  const diasMap = { "Lunes": 1, "Martes": 2, "Miércoles": 3, "Jueves": 4, "Viernes": 5 };

  // For multi-day subjects like Inglés
  if (materia.dia.includes(" y ")) {
    const partes = materia.dia.split(" y ");
    partes.forEach(p => {
      const diaNum = diasMap[p.trim()];
      if (diaNum) {
        let current = new Date(inicio);
        current.setDate(current.getDate() + ((diaNum - current.getDay() + 7) % 7));
        for (let i = 0; i < 8; i++) {
          fechas.push(new Date(current));
          current.setDate(current.getDate() + 7);
        }
      }
    });
    return fechas;
  }

  const diaNum = diasMap[materia.dia];
  if (!diaNum) return fechas;

  let current = new Date(inicio);
  current.setDate(current.getDate() + ((diaNum - current.getDay() + 7) % 7));

  const numWeeks = materia.tipo === "semestral" ? 8 : 8;
  for (let i = 0; i < numWeeks; i++) {
    fechas.push(new Date(current));
    current.setDate(current.getDate() + 7);
  }

  return fechas;
}

function generarICS(nivel, centro) {
  const zona = getZona(centro);
  const materias = DATA.niveles[nivel]?.materias || [];
  let events = [];

  const addEvent = (titulo, fechaStr, horaInicio, durMin, descripcion) => {
    const [h, m] = horaInicio.split(":").map(Number);
    const d = new Date(fechaStr);
    d.setHours(h, m, 0);
    const endD = new Date(d.getTime() + durMin * 60000);
    const fmt = (dt) => dt.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
    events.push(
      `BEGIN:VEVENT\nDTSTART:${fmt(d)}\nDTEND:${fmt(endD)}\nSUMMARY:${titulo}\nDESCRIPTION:${descripcion}\nEND:VEVENT`
    );
  };

  // Agregar clases
  materias.forEach(mat => {
    const bim = mat.bimestre[zona];
    const docente = getDocente(mat, centro);
    if (!mat.dia || !mat.hora) return;

    const horaBase = mat.hora.split("–")[0].split("-")[0].trim();
    const dur = mat.duracion || 90;

    if (bim === 0) {
      // Semestral: ambos bimestres
      [1, 2].forEach(b => {
        const fechas = generarFechasClases(mat, b);
        fechas.forEach(f => {
          const fechaStr = f.toISOString().split("T")[0];
          addEvent(`EIB: ${mat.corto}`, fechaStr, horaBase, dur, `Docente: ${docente}`);
        });
      });
    } else {
      const fechas = generarFechasClases(mat, bim);
      fechas.forEach((f, i) => {
        const fechaStr = f.toISOString().split("T")[0];
        const tipoSesion = mat.tipo === "clase-tutoria" ? (i % 2 === 0 ? " (Clase)" : " (Tutoría)") : "";
        addEvent(`EIB: ${mat.corto}${tipoSesion}`, fechaStr, horaBase, dur, `Docente: ${docente}`);
      });
    }
  });

  // Agregar entregas y exámenes
  [DATA.calendario.bim1, DATA.calendario.bim2].forEach((bim, idx) => {
    bim.entregas.forEach(e => {
      addEvent(`EIB: Entrega Actividad ${e.num} (Bim ${idx+1})`, e.fecha, "23:00", 59, "Fecha límite de entrega");
    });
    bim.examenes.forEach(ex => {
      addEvent(`EIB: Examen Final (Bim ${idx+1})`, ex, "08:00", 480, "Exámenes finales del bimestre");
    });
    bim.recuperacion.forEach(rec => {
      addEvent(`EIB: Examen Recuperación (Bim ${idx+1})`, rec, "08:00", 480, "Exámenes de recuperación");
    });
  });

  const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//EIB UPS//Horario P68//ES\nCALSCALE:GREGORIAN\n${events.join("\n")}\nEND:VCALENDAR`;

  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Horario_EIB_P68_${centro}_Nivel${nivel}.ics`;
  a.click();
  URL.revokeObjectURL(url);
}

function detectarCruces() {
  const allRows = generarTablaAdmin();
  const cruces = [];
  
  // Check online schedule conflicts (same docente, same day+time, different materia)
  for (let i = 0; i < allRows.length; i++) {
    for (let j = i + 1; j < allRows.length; j++) {
      const a = allRows[i], b = allRows[j];
      if (a.docente === b.docente && a.docente !== "Por confirmar" && a.docente !== "Departamento de Idiomas") {
        if (a.dia !== "Por confirmar" && b.dia !== "Por confirmar" && a.dia === b.dia && a.hora === b.hora) {
          if (a.asignatura !== b.asignatura || a.centro !== b.centro) {
            cruces.push({
              tipo: "online",
              docente: a.docente,
              dia: a.dia,
              hora: a.hora,
              matA: a.asignaturaCorta,
              centroA: a.centro,
              nivelA: a.nivel,
              matB: b.asignaturaCorta,
              centroB: b.centro,
              nivelB: b.nivel
            });
          }
        }
      }
    }
  }

  // Check presencial conflicts (same docente, same date+time, different centro or materia)
  const presEntries = [];
  Object.entries(DATA.presenciales || {}).forEach(([nivel, centros]) => {
    Object.entries(centros).forEach(([centro, bims]) => {
      ["bim1", "bim2"].forEach(bk => {
        (bims[bk] || []).forEach(e => {
          if (e.doc) {
            presEntries.push({ nivel: parseInt(nivel), centro, fecha: e.f, hora: e.h, docente: e.doc, materia: e.m, tipo: e.t });
          }
        });
      });
    });
  });

  for (let i = 0; i < presEntries.length; i++) {
    for (let j = i + 1; j < presEntries.length; j++) {
      const a = presEntries[i], b = presEntries[j];
      if (a.docente === b.docente && a.fecha === b.fecha && a.hora === b.hora) {
        if (a.centro !== b.centro || a.materia !== b.materia) {
          cruces.push({
            tipo: "presencial",
            docente: a.docente,
            dia: a.fecha,
            hora: a.hora,
            matA: a.materia.substring(0, 40),
            centroA: a.centro,
            nivelA: a.nivel,
            matB: b.materia.substring(0, 40),
            centroB: b.centro,
            nivelB: b.nivel
          });
        }
      }
    }
  }

  return cruces;
}

function generarTablaAdmin() {
  const rows = [];
  Object.entries(DATA.niveles).forEach(([nivelId, nivelData]) => {
    const centros = DATA.centrosPorNivel[nivelId] || [];
    nivelData.materias.forEach(mat => {
      centros.forEach(centro => {
        const zona = getZona(centro);
        const bim = mat.bimestre[zona];
        const docente = getDocente(mat, centro);
        const enlace = (mat.enlaces && (mat.enlaces[centro] || mat.enlaces["Todos los centros"])) || "";
        rows.push({
          nivel: parseInt(nivelId),
          nivelNombre: nivelData.nombre,
          centro,
          bloque: bim === 0 ? "Semestral" : bim === 1 ? "1er Bloque" : "2do Bloque",
          bloqueNum: bim,
          asignatura: mat.nombre,
          asignaturaCorta: mat.corto,
          docente,
          dia: mat.dia || "Por confirmar",
          hora: mat.hora || "Por confirmar",
          enlace,
          tipo: mat.tipo
        });
      });
    });
  });
  return rows;
}

function textoWhatsApp(r) {
  let t = "📚 *" + r.asignaturaCorta + "*\n👤 " + r.docente;
  if (r.dia !== "Por confirmar") t += "\n🕐 " + r.dia + " | " + r.hora;
  else t += "\n🕐 Horario por confirmar";
  if (r.enlace) t += "\n🔗 " + r.enlace;
  return t;
}

function textoSimple(r) {
  let t = r.asignaturaCorta + " con " + r.docente;
  if (r.dia !== "Por confirmar") t += " " + r.dia + " | " + r.hora;
  if (r.enlace) t += " " + r.enlace;
  return t;
}


// ── Admin Panel ──

function AdminLogin({ onBack, onLogin }) {
  const [user, setUser] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [error, setError] = React.useState(false);

  const UH = "7609390a793d4903facfe42f21af800c06dd28f93725b9a2006b3ca59947890e";
  const PH = "ef96974ad76e8614868138b69515722ab2afd596dec01cb44f8fa7aeae39720b";

  async function sha256(msg) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  const handleLogin = async (e) => {
    e.preventDefault();
    const uh = await sha256(user);
    const ph = await sha256(pass);
    if (uh === UH && ph === PH) {
      sessionStorage.setItem("eib_admin", "1");
      onLogin();
    } else {
      setError(true);
      setTimeout(() => setError(false), 3000);
    }
  };

  return (
    <div className="container" style={{maxWidth:420,marginTop:60}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔒</div>
        <h2 style={{fontSize:"18px",fontWeight:700,marginBottom:4}}>Panel de Administración</h2>
        <p style={{fontSize:"13px",color:"#718096",marginBottom:20}}>Ingresa tus credenciales para acceder</p>
        <form onSubmit={handleLogin}>
          <input type="text" placeholder="Usuario" value={user} onChange={e => setUser(e.target.value)} style={{width:"100%",padding:"10px 14px",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:10,fontSize:14,fontFamily:"Inter,sans-serif"}} />
          <input type="password" placeholder="Contrase\u00f1a" value={pass} onChange={e => setPass(e.target.value)} style={{width:"100%",padding:"10px 14px",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:16,fontSize:14,fontFamily:"Inter,sans-serif"}} />
          {error && <div style={{color:"#e53e3e",fontSize:13,marginBottom:12}}>Usuario o contraseña incorrectos</div>}
          <button type="submit" style={{width:"100%",padding:"12px",background:"#2d3748",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>Ingresar</button>
        </form>
        <button onClick={onBack} style={{marginTop:16,background:"none",border:"none",color:"#718096",fontSize:13,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>← Volver a vista de estudiante</button>
      </div>
    </div>
  );
}

function AdminPanel({ onBack }) {
  const [search, setSearch] = React.useState("");
  const [filterNivel, setFilterNivel] = React.useState("");
  const [filterCentro, setFilterCentro] = React.useState("");
  const [filterBloque, setFilterBloque] = React.useState("");
  const [copiedId, setCopiedId] = React.useState(null);
  const [expandedRow, setExpandedRow] = React.useState(null);

  const allRows = React.useMemo(() => generarTablaAdmin(), []);

  const filtered = allRows.filter(r => {
    if (search) {
      const s = search.toLowerCase();
      if (!r.asignatura.toLowerCase().includes(s) && !r.docente.toLowerCase().includes(s) && !r.centro.toLowerCase().includes(s)) return false;
    }
    if (filterNivel && r.nivel !== parseInt(filterNivel)) return false;
    if (filterCentro && r.centro !== filterCentro) return false;
    if (filterBloque && r.bloque !== filterBloque) return false;
    return true;
  });

  const copiar = (texto, id) => {
    navigator.clipboard.writeText(texto).then(() => {
      setCopiedId(id);
      setTimeout(() => setCopiedId(null), 2000);
    });
  };

  const copiarTodosWhatsApp = () => {
    const textos = filtered.map(r => textoWhatsApp(r)).join("\n\n─────\n\n");
    copiar(textos, "all");
  };

  const nivelesUnicos = [...new Set(allRows.map(r => r.nivel))].sort();
  const centrosUnicos = [...new Set(allRows.map(r => r.centro))];

  return (
    <div className="admin-container">
      <div className="admin-header">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <button className="btn-back" onClick={onBack}>← Vista estudiante</button>
          <div>
            <h1 style={{fontSize:"20px",fontWeight:700}}>Panel de Administración</h1>
            <p style={{fontSize:"13px",opacity:0.7}}>EIB en Línea · Período {DATA.periodo}</p>
          </div>
          <span className="admin-stat">📋 {filtered.length}/{allRows.length}</span>
        </div>
      </div>

      <div className="card">
        <div className="admin-filters">
          <input type="text" placeholder="🔍 Buscar asignatura, docente o centro..." value={search} onChange={e => setSearch(e.target.value)} />
          <select value={filterNivel} onChange={e => setFilterNivel(e.target.value)}>
            <option value="">Todos los niveles</option>
            {nivelesUnicos.map(n => <option key={n} value={n}>{n === 9 ? "Plan Contingencia" : n + "° Nivel"}</option>)}
          </select>
          <select value={filterCentro} onChange={e => setFilterCentro(e.target.value)}>
            <option value="">Todos los centros</option>
            {centrosUnicos.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <select value={filterBloque} onChange={e => setFilterBloque(e.target.value)}>
            <option value="">Todos los bloques</option>
            <option value="1er Bloque">1er Bloque</option>
            <option value="2do Bloque">2do Bloque</option>
            <option value="Semestral">Semestral</option>
          </select>
          <button className={`btn-copy ${copiedId === "all" ? "copied" : ""}`} onClick={copiarTodosWhatsApp} style={{padding:"8px 14px"}}>
            {copiedId === "all" ? "✓ Copiados" : "📋 Copiar filtrados"}
          </button>
        </div>
      </div>


      {(() => {
        const cruces = detectarCruces();
        if (cruces.length === 0) return null;
        return (
          <div className="card" style={{background:"#fff5f5", border:"1px solid #fc8181"}}>
            <h3 style={{fontSize:14, fontWeight:700, color:"#c53030", marginBottom:10}}>&#9888; Cruces Detectados ({cruces.length})</h3>
            {cruces.map((c, i) => (
              <div key={i} style={{padding:"8px 12px", background:"white", borderRadius:8, marginBottom:6, fontSize:12, border:"1px solid #fed7d7"}}>
                <span style={{fontWeight:600, color:"#c53030"}}>{c.docente}</span>
                <span style={{color:"#718096"}}> - {c.tipo === "presencial" ? formatFecha(c.dia) : c.dia} {c.hora}</span>
                <div style={{marginTop:4}}>
                  <span className="badge" style={{background:"#bee3f8", color:"#2a4365"}}>{c.nivelA}&#176; {c.centroA}</span>
                  <span style={{margin:"0 6px"}}>{c.matA}</span>
                  <span style={{color:"#e53e3e", fontWeight:700}}>vs</span>
                  <span style={{margin:"0 6px"}}>{c.matB}</span>
                  <span className="badge" style={{background:"#bee3f8", color:"#2a4365"}}>{c.nivelB}&#176; {c.centroB}</span>
                </div>
              </div>
            ))}
          </div>
        );
      })()}


      <div className="card" style={{padding:0,overflow:"auto"}}>
        <table className="admin-table">
          <thead>
            <tr>
              <th>Nivel</th>
              <th>Centro</th>
              <th>Bloque</th>
              <th>Asignatura</th>
              <th>Docente</th>
              <th>Día</th>
              <th>Hora</th>
              <th>Enlace</th>
              <th style={{textAlign:"center"}}>Copiar</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((r, i) => {
              const rowId = `${r.nivel}-${r.centro}-${r.asignaturaCorta}-${i}`;
              const isExp = expandedRow === rowId;
              return (
                <React.Fragment key={i}>
                  <tr className={isExp ? "highlighted" : ""} style={{cursor:"pointer"}} onClick={() => setExpandedRow(isExp ? null : rowId)}>
                    <td><span className="badge" style={{background: r.nivel === 9 ? "#fed7d7" : "#bee3f8", color: r.nivel === 9 ? "#9b2c2c" : "#2a4365"}}>{r.nivel === 9 ? "PC" : r.nivel + "°"}</span></td>
                    <td style={{fontWeight:500}}>{r.centro}</td>
                    <td><span className="badge" style={{background: r.bloqueNum === 1 ? "#bee3f8" : r.bloqueNum === 2 ? "#fefcbf" : "#c6f6d5", color: r.bloqueNum === 1 ? "#2a4365" : r.bloqueNum === 2 ? "#744210" : "#22543d"}}>{r.bloque}</span></td>
                    <td style={{maxWidth:220}}>{r.asignaturaCorta}</td>
                    <td style={{maxWidth:180}}>{r.docente}</td>
                    <td style={{color: r.dia === "Por confirmar" ? "#d69e2e" : "inherit", fontWeight: r.dia === "Por confirmar" ? 500 : 400}}>{r.dia}</td>
                    <td style={{color: r.hora === "Por confirmar" ? "#d69e2e" : "inherit"}}>{r.hora}</td>
                    <td>{r.enlace ? <a href={r.enlace} target="_blank" rel="noopener" style={{color:"#3182ce",fontSize:"12px"}}>Abrir ↗</a> : <span style={{color:"#cbd5e0",fontSize:"12px"}}>—</span>}</td>
                    <td style={{textAlign:"center"}}>
                      <button className={`btn-copy ${copiedId === rowId ? "copied" : ""}`} onClick={e => { e.stopPropagation(); copiar(textoSimple(r), rowId); }}>
                        {copiedId === rowId ? "✓" : "📋"}
                      </button>
                    </td>
                  </tr>
                  {isExp && (
                    <tr>
                      <td colSpan={9} style={{padding:"12px 16px",background:"#f7fafc"}}>
                        <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                          <div>
                            <div style={{fontSize:"11px",fontWeight:600,color:"#718096",marginBottom:4,textTransform:"uppercase"}}>Vista previa WhatsApp</div>
                            <div className="whatsapp-preview" style={{whiteSpace:"pre-line"}}>{textoWhatsApp(r)}</div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:16}}>
                            <button className={`btn-copy ${copiedId === rowId + "-wa" ? "copied" : ""}`} onClick={e => { e.stopPropagation(); copiar(textoWhatsApp(r), rowId + "-wa"); }} style={{padding:"8px 16px"}}>
                              {copiedId === rowId + "-wa" ? "✓ Copiado" : "📋 Copiar formato WhatsApp"}
                            </button>
                            <button className={`btn-copy ${copiedId === rowId + "-s" ? "copied" : ""}`} onClick={e => { e.stopPropagation(); copiar(textoSimple(r), rowId + "-s"); }} style={{padding:"8px 16px"}}>
                              {copiedId === rowId + "-s" ? "✓ Copiado" : "📋 Copiar texto simple"}
                            </button>
                          </div>
                        </div>
                        <div style={{marginTop:8,fontSize:"11px",color:"#a0aec0"}}>Nombre completo: {r.asignatura}</div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && <div className="empty-state">No se encontraron resultados.</div>}
      </div>
    </div>
  );
}


// ── App Root (Student + Admin) ──

function AppRoot() {
  const [mode, setMode] = React.useState("student");
  const [adminAuth, setAdminAuth] = React.useState(sessionStorage.getItem("eib_admin") === "1");

  if (mode === "admin") {
    if (adminAuth) {
      return <AdminPanel onBack={() => setMode("student")} />;
    }
    return <AdminLogin onBack={() => setMode("student")} onLogin={() => setAdminAuth(true)} />;
  }
  return <StudentView onAdmin={() => setMode("admin")} />;
}

function StudentView({ onAdmin }) {
  const [centro, setCentro] = React.useState(null);
  const [nivel, setNivel] = React.useState(null);
  const [tab, setTab] = React.useState("horario");

  const nivelesDisponibles = centro
    ? Object.entries(DATA.centrosPorNivel)
        .filter(([_, centros]) => centros.includes(centro))
        .map(([n]) => parseInt(n))
    : [];

  const handleCentro = (c) => { setCentro(c); setNivel(null); };

  return (
    <div className="container">
      <div className="header">
        <h1 style={{fontSize:"24px",fontWeight:700,marginBottom:4}}>Educación Intercultural Bilingüe</h1>
        <p style={{fontSize:"16px",opacity:0.9,marginBottom:2}}>Modalidad en Línea</p>
        <p style={{fontSize:"14px",opacity:0.7}}>Período {DATA.periodo} · {DATA.periodoLabel}</p>
        <button className="btn-admin-toggle" onClick={onAdmin}>⚙ Administración</button>
      </div>

      <div className="card">
        <p style={{fontSize:"13px",color:"#718096",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>1. Selecciona tu centro de apoyo</p>
        <div className="selector-grid">
          {["Latacunga", "Cayambe", "Otavalo", "Riobamba", "Amazonía Norte", "Wasakentsa"].map(c => (
            <button key={c} className={`btn ${centro === c ? 'active' : ''}`} onClick={() => handleCentro(c)}>{c}</button>
          ))}
        </div>
        {centro && (
          <div className="fade-in" style={{marginTop:16}}>
            <p style={{fontSize:"13px",color:"#718096",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>2. Selecciona tu nivel</p>
            <div className="selector-grid">
              {nivelesDisponibles.map(n => (
                <button key={n} className={`btn ${nivel === n ? 'active' : ''}`} onClick={() => setNivel(n)}>
                  {n === 9 ? "Plan Contingencia (9°)" : `${n}° Nivel`}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      {centro && nivel && (
        <div className="fade-in">
          <HorarioView centro={centro} nivel={nivel} tab={tab} setTab={setTab} />
        </div>
      )}
    </div>
  );
}


// ── Render ──
ReactDOM.render(<AppRoot />, document.getElementById("root"));

</script>
