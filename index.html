// ── Utilidades ──

function getZona(centro) {
  return DATA.zonas[centro] || "OC";
}

function getMateriasBimestre(nivel, centro, bim) {
  const zona = getZona(centro);
  const materias = DATA.niveles[nivel]?.materias || [];
  return materias.filter(m => {
    const b = m.bimestre[zona];
    if (bim === 0) return b === 0; // semestral
    if (bim === 1) return b === 1;
    if (bim === 2) return b === 2;
    return false;
  });
}

function getDocente(materia, centro) {
  return materia.docentes[centro] || materia.docentes["Todos los centros"] || "Por confirmar";
}

function formatFecha(str) {
  const d = new Date(str + "T12:00:00");
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
}

function formatFechaCorta(str) {
  const d = new Date(str + "T12:00:00");
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${d.getDate()} ${meses[d.getMonth()]}`;
}

function getDayClass(dia, tipo) {
  if (tipo === "por-confirmar") return "day-por-confirmar";
  if (!dia) return "day-semestral";
  const d = dia.toLowerCase();
  if (d.includes("lunes")) return "day-lunes";
  if (d.includes("martes")) return "day-martes";
  if (d.includes("miércoles") || d.includes("viernes")) return "day-miercoles";
  if (d.includes("jueves")) return "day-jueves";
  return "day-semestral";
}

// ── Generador ICS ──

function generarFechasClases(materia, bimNum) {
  const bimData = bimNum === 1 ? DATA.calendario.bim1 : DATA.calendario.bim2;
  const inicio = new Date(bimData.inicio + "T12:00:00");
  const fechas = [];

  if (!materia.dia || !materia.hora) return fechas;

  const diasMap = { "Lunes": 1, "Martes": 2, "Miércoles": 3, "Jueves": 4, "Viernes": 5 };

  // For multi-day subjects like Inglés
  if (materia.dia.includes(" y ")) {
    const partes = materia.dia.split(" y ");
    partes.forEach(p => {
      const diaNum = diasMap[p.trim()];
      if (diaNum) {
        let current = new Date(inicio);
        current.setDate(current.getDate() + ((diaNum - current.getDay() + 7) % 7));
        for (let i = 0; i < 8; i++) {
          fechas.push(new Date(current));
          current.setDate(current.getDate() + 7);
        }
      }
    });
    return fechas;
  }

  const diaNum = diasMap[materia.dia];
  if (!diaNum) return fechas;

  let current = new Date(inicio);
  current.setDate(current.getDate() + ((diaNum - current.getDay() + 7) % 7));

  const numWeeks = materia.tipo === "semestral" ? 8 : 8;
  for (let i = 0; i < numWeeks; i++) {
    fechas.push(new Date(current));
    current.setDate(current.getDate() + 7);
  }

  return fechas;
}

function detectarCruces() {
  var cruces = [];
  // Check online sessions: same docente, same day of week + same time
  var niveles = Object.keys(DATA.niveles).map(Number);
  var docenteSlots = {};
  niveles.forEach(function(nivel) {
    var info = DATA.niveles[nivel];
    var centros = DATA.centrosPorNivel[nivel] || [];
    centros.forEach(function(centro) {
      info.materias.forEach(function(mat) {
        if (!mat.dia || !mat.hora) return;
        var doc = getDocente(mat, centro);
        if (!doc || doc === "Departamento de Idiomas" || doc === "Por confirmar") return;
        var key = doc + "|" + mat.dia + "|" + mat.hora;
        if (!docenteSlots[key]) docenteSlots[key] = [];
        docenteSlots[key].push({ nivel: nivel, centro: centro, mat: mat.corto, docente: doc, dia: mat.dia, hora: mat.hora });
      });
    });
  });
  Object.keys(docenteSlots).forEach(function(key) {
    var slots = docenteSlots[key];
    if (slots.length > 1) {
      for (var i = 0; i < slots.length; i++) {
        for (var j = i + 1; j < slots.length; j++) {
          var a = slots[i], b = slots[j];
          if (a.nivel === b.nivel && a.centro === b.centro) continue;
          cruces.push({
            tipo: "online",
            docente: a.docente,
            dia: a.dia,
            hora: a.hora,
            nivelA: a.nivel, centroA: a.centro, matA: a.mat,
            nivelB: b.nivel, centroB: b.centro, matB: b.mat
          });
        }
      }
    }
  });
  // Check presencial: same docente, same date + overlapping time
  var presDocSlots = {};
  Object.keys(DATA.presenciales || {}).forEach(function(niv) {
    var nivel = parseInt(niv);
    var centros = DATA.presenciales[niv];
    Object.keys(centros).forEach(function(centro) {
      var bims = centros[centro];
      ["bim1", "bim2"].forEach(function(bk) {
        (bims[bk] || []).forEach(function(ses) {
          var doc = ses.doc;
          if (!doc) return;
          var key2 = doc + "|" + ses.f + "|" + ses.h;
          if (!presDocSlots[key2]) presDocSlots[key2] = [];
          presDocSlots[key2].push({ nivel: nivel, centro: centro, mat: ses.m.substring(0, 40), docente: doc, dia: ses.f, hora: ses.h });
        });
      });
    });
  });
  Object.keys(presDocSlots).forEach(function(key) {
    var slots = presDocSlots[key];
    if (slots.length > 1) {
      for (var i = 0; i < slots.length; i++) {
        for (var j = i + 1; j < slots.length; j++) {
          var a = slots[i], b = slots[j];
          if (a.nivel === b.nivel && a.centro === b.centro) continue;
          cruces.push({
            tipo: "presencial",
            docente: a.docente,
            dia: a.dia,
            hora: a.hora,
            nivelA: a.nivel, centroA: a.centro, matA: a.mat,
            nivelB: b.nivel, centroB: b.centro, matB: b.mat
          });
        }
      }
    }
  });
  return cruces;
}

function generarICS(nivel, centro) {
  const zona = getZona(centro);
  const materias = DATA.niveles[nivel]?.materias || [];
  let events = [];

  const addEvent = (titulo, fechaStr, horaInicio, durMin, descripcion) => {
    const [h, m] = horaInicio.split(":").map(Number);
    const d = new Date(fechaStr);
    d.setHours(h, m, 0);
    const endD = new Date(d.getTime() + durMin * 60000);
    const fmt = (dt) => dt.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
    events.push(
      `BEGIN:VEVENT\nDTSTART:${fmt(d)}\nDTEND:${fmt(endD)}\nSUMMARY:${titulo}\nDESCRIPTION:${descripcion}\nEND:VEVENT`
    );
  };

  // Agregar clases
  materias.forEach(mat => {
    const bim = mat.bimestre[zona];
    const docente = getDocente(mat, centro);
    if (!mat.dia || !mat.hora) return;

    const horaBase = mat.hora.split("–")[0].split("-")[0].trim();
    const dur = mat.duracion || 90;

    if (bim === 0) {
      // Semestral: ambos bimestres
      [1, 2].forEach(b => {
        const fechas = generarFechasClases(mat, b);
        fechas.forEach(f => {
          const fechaStr = f.toISOString().split("T")[0];
          addEvent(`EIB: ${mat.corto}`, fechaStr, horaBase, dur, `Docente: ${docente}`);
        });
      });
    } else {
      const fechas = generarFechasClases(mat, bim);
      fechas.forEach((f, i) => {
        const fechaStr = f.toISOString().split("T")[0];
        const tipoSesion = mat.tipo === "clase-tutoria" ? (i % 2 === 0 ? " (Clase)" : " (Tutoría)") : "";
        addEvent(`EIB: ${mat.corto}${tipoSesion}`, fechaStr, horaBase, dur, `Docente: ${docente}`);
      });
    }
  });

  // Agregar entregas y exámenes
  [DATA.calendario.bim1, DATA.calendario.bim2].forEach((bim, idx) => {
    bim.entregas.forEach(e => {
      addEvent(`EIB: Entrega Actividad ${e.num} (Bim ${idx+1})`, e.fecha, "23:00", 59, "Fecha límite de entrega");
    });
    bim.examenes.forEach(ex => {
      addEvent(`EIB: Examen Final (Bim ${idx+1})`, ex, "08:00", 480, "Exámenes finales del bimestre");
    });
    bim.recuperacion.forEach(rec => {
      addEvent(`EIB: Examen Recuperación (Bim ${idx+1})`, rec, "08:00", 480, "Exámenes de recuperación");
    });
  });

  const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//EIB UPS//Horario P68//ES\nCALSCALE:GREGORIAN\n${events.join("\n")}\nEND:VCALENDAR`;

  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Horario_EIB_P68_${centro}_Nivel${nivel}.ics`;
  a.click();
  URL.revokeObjectURL(url);
}

function AdminLogin({ onBack, onLogin }) {
  const [user, setUser] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [error, setError] = React.useState(false);

  const UH = "7609390a793d4903facfe42f21af800c06dd28f93725b9a2006b3ca59947890e";
  const PH = "ef96974ad76e8614868138b69515722ab2afd596dec01cb44f8fa7aeae39720b";

  async function sha256(msg) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  const handleLogin = async (e) => {
    e.preventDefault();
    const uh = await sha256(user);
    const ph = await sha256(pass);
    if (uh === UH && ph === PH) {
      sessionStorage.setItem("eib_admin", "1");
      onLogin();
    } else {
      setError(true);
      setTimeout(() => setError(false), 3000);
    }
  };

  return (
    <div className="container" style={{maxWidth:420,marginTop:60}}>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔒</div>
        <h2 style={{fontSize:"18px",fontWeight:700,marginBottom:4}}>Panel de Administración</h2>
        <p style={{fontSize:"13px",color:"#718096",marginBottom:20}}>Ingresa tus credenciales para acceder</p>
        <form onSubmit={handleLogin}>
          <input type="text" placeholder="Usuario" value={user} onChange={e => setUser(e.target.value)} style={{width:"100%",padding:"10px 14px",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:10,fontSize:14,fontFamily:"Inter,sans-serif"}} />
          <input type="password" placeholder="Contraseña" value={pass} onChange={e => setPass(e.target.value)} style={{width:"100%",padding:"10px 14px",border:"1px solid #e2e8f0",borderRadius:8,marginBottom:16,fontSize:14,fontFamily:"Inter,sans-serif"}} />
          {error && <div style={{color:"#e53e3e",fontSize:13,marginBottom:12}}>Usuario o contraseña incorrectos</div>}
          <button type="submit" style={{width:"100%",padding:"12px",background:"#2d3748",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>Ingresar</button>
        </form>
        <button onClick={onBack} style={{marginTop:16,background:"none",border:"none",color:"#718096",fontSize:13,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>← Volver a vista de estudiante</button>
      </div>
    </div>
  );
}

function NotificationBanner({ centro, nivel }) {
  const [permission, setPermission] = React.useState(
    typeof Notification !== "undefined" ? Notification.permission : "denied"
  );
  const [dismissed, setDismissed] = React.useState(false);

  if (typeof Notification === "undefined" || permission === "granted" || permission === "denied" || dismissed) {
    return null;
  }

  const requestPerm = () => {
    Notification.requestPermission().then(p => {
      setPermission(p);
      if (p === "granted" && "serviceWorker" in navigator) {
        navigator.serviceWorker.ready.then(reg => {
          reg.active && reg.active.postMessage({ type: "SCHEDULE_CHECK" });
        });
      }
    });
  };

  return (
    <div style={{background:"#ebf8ff",border:"1px solid #90cdf4",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12,fontSize:13}}>
      <span style={{fontSize:20}}>&#128276;</span>
      <div style={{flex:1}}>
        <strong>Recibe recordatorios</strong>
        <div style={{color:"#4a5568",marginTop:2}}>Te avisamos antes de cada clase virtual y encuentro presencial</div>
      </div>
      <button onClick={requestPerm} style={{background:"#3182ce",color:"white",border:"none",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"Inter,sans-serif"}}>Activar</button>
      <button onClick={() => setDismissed(true)} style={{background:"none",border:"none",color:"#a0aec0",cursor:"pointer",fontSize:18,padding:4}}>&#10005;</button>
    </div>
  );
}

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"8px 16px",border:"1px solid #e2e8f0",borderRadius:8,background:"white",cursor:"pointer",fontSize:13,fontFamily:"Inter,sans-serif"}}>Cancelar</button>
          <button onClick={handleSave} disabled={saving} style={{padding:"8px 16px",border:"none",borderRadius:8,background:"#3182ce",color:"white",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"Inter,sans-serif",opacity:saving?0.6:1}}>
            {saving ? "Guardando..." : "Guardar"}
          </button>
        </div>
      </div>
    </div>
  );
}


// ── Render ──
ReactDOM.render(<AppRoot />, document.getElementById("root"));

// ── Service Worker para notificaciones ──
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    // Register inline service worker via blob
    var swCode = `
      var SCHEDULE_DATA = null;

      self.addEventListener("install", function(e) { self.skipWaiting(); });
      self.addEventListener("activate", function(e) { e.waitUntil(self.clients.matchAll().then(function(clients) { clients.forEach(function(c) { c.postMessage({type:"SW_READY"}); }); })); });

      self.addEventListener("message", function(e) {
        if (e.data && e.data.type === "SCHEDULE_DATA") {
          SCHEDULE_DATA = e.data.sessions;
          scheduleChecks();
        }
        if (e.data && e.data.type === "SCHEDULE_CHECK") {
          checkUpcoming();
        }
      });

      function scheduleChecks() {
        // Check every 60 seconds
        setInterval(checkUpcoming, 60000);
        checkUpcoming();
      }

      function checkUpcoming() {
        if (!SCHEDULE_DATA || SCHEDULE_DATA.length === 0) return;
        var now = new Date();
        SCHEDULE_DATA.forEach(function(ses) {
          var sesTime = new Date(ses.datetime);
          var diffMs = sesTime - now;
          var diffMin = diffMs / 60000;

          // 10 min before virtual class
          if (ses.virtual && diffMin > 9 && diffMin <= 10.5) {
            self.registration.showNotification("EIB - Clase en 10 min", {
              body: ses.materia + " a las " + ses.hora,
              icon: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%231a365d" width="100" height="100" rx="20"/><text x="50" y="65" text-anchor="middle" fill="white" font-size="50" font-family="sans-serif">EIB</text></svg>'),
              tag: "eib-" + ses.datetime,
              requireInteraction: true
            });
          }
          // 5 min before virtual class
          if (ses.virtual && diffMin > 4 && diffMin <= 5.5) {
            self.registration.showNotification("EIB - Clase en 5 min!", {
              body: ses.materia + " a las " + ses.hora + " - Ya casi inicia!",
              icon: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23c53030" width="100" height="100" rx="20"/><text x="50" y="65" text-anchor="middle" fill="white" font-size="50" font-family="sans-serif">EIB</text></svg>'),
              tag: "eib-5-" + ses.datetime,
              requireInteraction: true
            });
          }
        });
      }

      self.addEventListener("notificationclick", function(e) {
        e.notification.close();
        e.waitUntil(
          self.clients.matchAll({type:"window"}).then(function(clients) {
            if (clients.length > 0) { clients[0].focus(); }
            else { self.clients.openWindow("https://cvasconezp.github.io/horario-eib-p68/"); }
          })
        );
      });
    `;

    var blob = new Blob([swCode], {type: "application/javascript"});
    var swUrl = URL.createObjectURL(blob);

    navigator.serviceWorker.register(swUrl, {scope: "/"}).then(function(reg) {
      console.log("SW registered");

      // Send schedule data to SW
      function sendScheduleToSW() {
        var sessions = [];
        var niveles = [2,4,6,8];
        niveles.forEach(function(nivel) {
          var sesiones = DATA.sesionesEnLinea[nivel] || [];
          sesiones.forEach(function(subj) {
            subj.s.forEach(function(ses) {
              sessions.push({
                materia: subj.m,
                hora: ses.h,
                datetime: ses.f + "T" + ses.h + ":00",
                virtual: true
              });
            });
          });
        });
        if (reg.active) {
          reg.active.postMessage({type: "SCHEDULE_DATA", sessions: sessions});
        }
      }

      if (reg.active) {
        sendScheduleToSW();
      }
      reg.addEventListener("updatefound", function() {
        var newW = reg.installing;
        newW.addEventListener("statechange", function() {
          if (newW.state === "activated") { sendScheduleToSW(); }
        });
      });
    }).catch(function(err) {
      console.log("SW registration failed (expected on some hosts):", err.message);
    });
  });
}

</script>
